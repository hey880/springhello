apiVersion: v1
kind: Service
metadata:
  name: yeji-deployment-practice-svc   # Service 오브젝트 이름
spec:
  selector:
    app: spring                # 이 label을 가진 Pod들을 찾아서 트래픽을 전달
    # → Deployment의 Pod label(app: spring)과 반드시 일치해야 함
  ports:
    - protocol: TCP
      port: 8080                # Service 자체가 클러스터 내부에 노출하는 포트
      targetPort: 8080           # 실제로 전달할 대상, 즉 Pod의 containerPort
      nodePort: 30220             # 클러스터 외부에서 접속할 때 쓰는 포트 (노드 IP:30220)
  type: NodePort                 # 외부에서 접근 가능하게 만드는 방식