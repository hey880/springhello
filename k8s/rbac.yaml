apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-agent
  namespace: yjlee

---
#  "이런 리소스에 대해 이런 동작을 허용한다"는 권한 목록. verbs에 delete는 없으니, 실수로 삭제하는 명령은 이 권한으로는 실행 불가.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-deployer-role
  namespace: yjlee # <namespace>, 권한을 적용할 대상 namespace
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"] # 대상: Deployment/ReplicaSet
    verbs: ["get", "list", "watch", "create", "update", "patch"] # 허용 동작
  - apiGroups: [""]
    resources: ["services", "pods"] # 대상: ServicePod
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
# ServiceAccount(신원)와 Role(권한 목록)을 실제로 연결해주는 다리 역할. Role만 만들고 RoleBinding이 없으면 아무 효과가 없다.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-deployer-binding
  namespace: yjlee # <namespace>, Role과 같은 namespace에 있어야함.
subjects:
  - kind: ServiceAccount
    name: jenkins-agent  # 누구에게
    namespace: yjlee # serviceaccount가 실제로 속한 namespace
roleRef:
  kind: Role
  name: jenkins-deployer-role  # 이 권한 목록을 연결할 것인지
  apiGroup: rbac.authorization.k8s.io