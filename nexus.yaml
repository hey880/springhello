apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-data-pvc
  namespace: yjlee
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus
  namespace: yjlee
  labels:
    app: nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      containers:
        - name: nexus3
          image: sonatype/nexus3:latest # Sonatype 공식 nexus3 이미지
          ports:
            - containerPort: 8081
              name: nexus-port
          securityContext:
            runAsUser: 200 # 공식 이미지의 기본 nexus 유저 UID (권한 에러 방지)
          volumeMounts:
            - name: nexus-data
              mountPath: /nexus-data # Nexus 데이터 저장 경로로 고정
      volumes:
        - name: nexus-data
          persistentVolumeClaim:
            claimName: nexus-data-pvc # 위에서 생성한 PVC와 연결
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-service
  namespace: yjlee
spec:
  type: NodePort
  selector:
    app: nexus
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      nodePort: 30221